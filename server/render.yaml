# Render.com blueprint. Deploy: push repo, then "New > Blueprint" in Render.
# Set MONGODB_URI and API_KEY as secret env vars in the dashboard (do NOT
# commit them here).
services:
  - type: web
    name: flowiix-pos-server
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
